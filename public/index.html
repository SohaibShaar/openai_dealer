<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Parser</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: Arial, sans-serif;
        background: #f7f7f8;
        color: #111;
        padding: 20px;
      }
      .container {
        max-width: 1400px;
        margin: 0 auto;
      }
      h1 {
        margin-bottom: 20px;
        text-align: center;
      }
      .status {
        text-align: center;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-weight: bold;
      }
      .status.connected {
        background: #10b981;
        color: white;
      }
      .status.disconnected {
        background: #ef4444;
        color: white;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 2fr;
        gap: 20px;
        margin-bottom: 20px;
      }
      @media (max-width: 768px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
      .panel {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      h2 {
        margin-bottom: 15px;
        font-size: 18px;
        color: #2563eb;
      }
      textarea {
        width: 100%;
        min-height: 140px;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 14px;
        resize: vertical;
        font-family: inherit;
      }
      button {
        margin-top: 12px;
        padding: 10px 16px;
        border: 0;
        border-radius: 8px;
        background: #2563eb;
        color: #fff;
        font-size: 14px;
        cursor: pointer;
        width: 100%;
      }
      button:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }
      button:hover:not(:disabled) {
        background: #1d4ed8;
      }
      pre {
        margin-top: 16px;
        background: #111827;
        color: #e5e7eb;
        padding: 12px;
        border-radius: 8px;
        overflow: auto;
        min-height: 120px;
        direction: ltr;
        font-size: 13px;
      }
      .error {
        color: #b91c1c;
        margin-top: 10px;
        font-weight: bold;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
        font-size: 14px;
      }
      th, td {
        padding: 10px;
        text-align: center;
        border-bottom: 1px solid #e5e7eb;
      }
      th {
        background: #f3f4f6;
        font-weight: bold;
        color: #374151;
      }
      tr:hover {
        background: #f9fafb;
      }
      .badge {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: bold;
        white-space: nowrap;
      }
      .badge.buy {
        background: #10b981;
        color: white;
      }
      .badge.sell {
        background: #ef4444;
        color: white;
      }
      .badge.new {
        background: #3b82f6;
        color: white;
      }
      .badge.closed {
        background: #6b7280;
        color: white;
      }
      .badge.delete {
        background: #dc2626;
        color: white;
      }
      .badge.update {
        background: #f59e0b;
        color: white;
      }
      .badge.set, .badge.moved {
        background: #8b5cf6;
        color: white;
      }
      .orders-container {
        max-height: 600px;
        overflow-y: auto;
      }
      .new-order-flash {
        animation: flash 1s ease-in-out;
      }
      @keyframes flash {
        0%, 100% { background: transparent; }
        50% { background: #fef3c7; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🚀 Order Parser & Live Monitor</h1>

      <div id="wsStatus" class="status disconnected">
        ⚠️ غير متصل بالسيرفر
      </div>

      <div class="grid">
        <div class="panel">
          <h2>📝 تجربة API</h2>
          <textarea id="messageInput" placeholder="اكتب الرسالة هنا لاختبار API..."></textarea>
          <button id="parseBtn">تحويل</button>
          <div id="errorText" class="error"></div>
          <pre id="jsonOutput">{}</pre>
        </div>

        <div class="panel">
          <h2>📊 الطلبات المباشرة (Live Orders)</h2>
          <div class="orders-container">
            <table id="ordersTable">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>النوع</th>
                  <th>الصفقة</th>
                  <th>الرمز</th>
                  <th>Lots</th>
                  <th>SL</th>
                  <th>TP</th>
                  <th>الرصيد</th>
                </tr>
              </thead>
              <tbody id="ordersBody">
                <tr>
                  <td colspan="8" style="text-align: center; padding: 20px; color: #6b7280;">
                    في انتظار البيانات...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script>
      const messageInput = document.getElementById("messageInput");
      const parseBtn = document.getElementById("parseBtn");
      const jsonOutput = document.getElementById("jsonOutput");
      const errorText = document.getElementById("errorText");
      const wsStatus = document.getElementById("wsStatus");
      const ordersBody = document.getElementById("ordersBody");

      let ws;
      const orders = new Map();

      // الاتصال بـ WebSocket
      function connectWebSocket() {
        const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
        ws = new WebSocket(`${protocol}//${window.location.host}`);

        ws.onopen = () => {
          wsStatus.className = "status connected";
          wsStatus.textContent = "✅ متصل بالسيرفر (Live)";
          loadExistingOrders();
        };

        ws.onmessage = (event) => {
          const data = JSON.parse(event.data);
          
          // معالجة الحالات المختلفة
          if (data.action === "delete") {
            // حذف الطلب من القائمة
            deleteOrder(data.id);
          } else if (data.action === "update") {
            // تحديث الطلب
            addOrUpdateOrder(data, true);
          } else {
            // إضافة طلب جديد
            addOrUpdateOrder(data, true);
          }
        };

        ws.onclose = () => {
          wsStatus.className = "status disconnected";
          wsStatus.textContent = "⚠️ انقطع الاتصال - محاولة إعادة الاتصال...";
          setTimeout(connectWebSocket, 3000);
        };

        ws.onerror = () => {
          wsStatus.className = "status disconnected";
          wsStatus.textContent = "❌ خطأ في الاتصال";
        };
      }

      // تحميل الطلبات الموجودة
      async function loadExistingOrders() {
        try {
          const response = await fetch("/orders");
          const existingOrders = await response.json();
          existingOrders.forEach(order => addOrUpdateOrder(order, false));
        } catch (error) {
          console.error("خطأ في تحميل الطلبات:", error);
        }
      }

      // إضافة أو تحديث طلب في الجدول
      function addOrUpdateOrder(order, isNew) {
        orders.set(order.id, order);
        renderOrders(isNew ? order.id : null);
      }

      // حذف طلب من الجدول
      function deleteOrder(orderId) {
        if (orders.has(orderId)) {
          orders.delete(orderId);
          console.log(`🗑️ تم حذف Order #${orderId}`);
          renderOrders();
        }
      }

      // عرض جميع الطلبات
      function renderOrders(flashId = null) {
        if (orders.size === 0) {
          ordersBody.innerHTML = `
            <tr>
              <td colspan="8" style="text-align: center; padding: 20px; color: #6b7280;">
                لا توجد طلبات بعد
              </td>
            </tr>
          `;
          return;
        }

        ordersBody.innerHTML = "";
        const sortedOrders = Array.from(orders.values()).reverse();

        sortedOrders.forEach(order => {
          const row = document.createElement("tr");
          if (flashId === order.id) {
            row.className = "new-order-flash";
          }

          const dealBadge = order.deal 
            ? `<span class="badge ${order.deal.toLowerCase()}">${order.deal}</span>` 
            : "-";
          
          // تحديد اللون حسب نوع الرسالة
          let typeBadgeClass = "";
          if (order.type === "NEW") typeBadgeClass = "new";
          else if (order.type === "CLOSED") typeBadgeClass = "closed";
          else if (order.type && order.type.includes("DELETE")) typeBadgeClass = "delete";
          else if (order.type && (order.type.includes("Set") || order.type.includes("Moved"))) typeBadgeClass = "update";
          
          const typeBadge = order.type 
            ? `<span class="badge ${typeBadgeClass}">${order.type}</span>` 
            : "-";

          row.innerHTML = `
            <td><strong>#${order.id || "-"}</strong></td>
            <td>${typeBadge}</td>
            <td>${dealBadge}</td>
            <td><strong>${order.symbol || "-"}</strong></td>
            <td>${order.lots !== null ? order.lots : "-"}</td>
            <td>${order.sl !== null ? order.sl : "-"}</td>
            <td>${order.tp !== null ? order.tp : "-"}</td>
            <td>${order.balance !== null ? order.balance.toLocaleString() : "-"}</td>
          `;

          ordersBody.appendChild(row);
        });
      }

      // اختبار API
      async function parseMessage() {
        const message = messageInput.value.trim();
        errorText.textContent = "";

        if (!message) {
          errorText.textContent = "الرجاء إدخال رسالة أولاً.";
          jsonOutput.textContent = "{}";
          return;
        }

        parseBtn.disabled = true;
        parseBtn.textContent = "جاري التحويل...";

        try {
          const response = await fetch("/parse-order", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message }),
          });

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || "حدث خطأ أثناء المعالجة.");
          }

          jsonOutput.textContent = JSON.stringify(data, null, 2);
        } catch (error) {
          errorText.textContent = error.message;
          jsonOutput.textContent = "{}";
        } finally {
          parseBtn.disabled = false;
          parseBtn.textContent = "تحويل";
        }
      }

      parseBtn.addEventListener("click", parseMessage);
      
      // بدء الاتصال
      connectWebSocket();
    </script>
  </body>
</html>
